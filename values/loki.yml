backend:
  replicas: 0
chunksCache:
  enabled: false
deploymentMode: SingleBinary
loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  schemaConfig:
    configs:
      - from: "2024-04-01"
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: loki_index_
          period: 24h
  storage:
    type: s3
    bucketNames:
      chunks: chunks
      ruler: ruler
      admin: admin
minio:
  enabled: true
monitoring:
  dashboards:
    enabled: true
  serviceMonitor:
    enabled: true
read:
  replicas: 0
singleBinary:
  replicas: 1
write:
  replicas: 0