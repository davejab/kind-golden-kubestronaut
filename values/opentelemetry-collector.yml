config:
  exporters:
    otlp_http/loki:
      endpoint: http://loki.monitoring.svc.cluster.local:3100/otlp
    otlp_grpc/jaeger:
      endpoint: http://jaeger.monitoring.svc.cluster.local:4317
      tls:
        insecure: true

  service:
    pipelines:
      logs:
        exporters:
          - otlp_http/loki
      traces:
        exporters:
          - otlp_grpc/jaeger

image:
  repository: otel/opentelemetry-collector-contrib

mode: daemonset

podMonitor:
  enabled: true

ports:
  metrics:
    enabled: true

presets:
  kubernetesAttributes:
    enabled: true
  logsCollection:
    enabled: true
    includeCollectorLogs: true

service:
  enabled: true