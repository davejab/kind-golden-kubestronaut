kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: golden
nodes:
- role: control-plane
  image: kindest/node:v1.35.1
  kubeadmConfigPatches:
  - |
    kind: ClusterConfiguration
    scheduler:
      extraArgs:
        bind-address: 0.0.0.0
    controllerManager:
      extraArgs:
        bind-address: 0.0.0.0
    etcd:
      local:
        extraArgs:
          listen-metrics-urls: http://0.0.0.0:2381
- role: worker
  image: kindest/node:v1.35.1
networking:
  disableDefaultCNI: true
  kubeProxyMode: "none"