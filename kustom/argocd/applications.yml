    automated:
      prune: false
      enabled: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hotrod
  annotations:
    "helm.sh/hook": post-install,post-upgrade
spec:
  destination:
    namespace: hotrod
    server: https://kubernetes.default.svc
  source:
    path: hotrod
    repoURL: https://github.com/davejab/sample-apps
    targetRevision: HEAD
    helm:
      valueFiles:
        - values.yaml
      parameters:
        - name: ingress.enabled
          value: 'true'
        - name: ingress.hosts[0].host
        - name: otel.exporterEndpoint
          value: http://jaeger.monitoring.svc.cluster.local:4318
        - name: commonLabels.backstage\.io/kubernetes-id
          value: hotrod
  project: sample-apps
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
      enabled: true
    syncOptions:
      - CreateNamespace=true