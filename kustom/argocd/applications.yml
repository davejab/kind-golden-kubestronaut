apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bookinfo
  annotations:
    "helm.sh/hook": post-install,post-upgrade
spec:
  destination:
    namespace: bookinfo
    server: https://kubernetes.default.svc
  project: sample-apps
  source:
    path: bookinfo
    repoURL: https://github.com/davejab/sample-apps
    targetRevision: HEAD
    helm:
      valueFiles:
        - values.yaml
      parameters:
        - name: productpage.serviceMonitor.enabled
          value: 'true'
        - name: productpage.ingress.enabled
          value: 'true'
        - name: productpage.ingress.hosts[0].host
        - name: details.labels.backstage\.io/kubernetes-id
          value: details
        - name: productpage.labels.backstage\.io/kubernetes-id
          value: productpage
        - name: reviews.labels.backstage\.io/kubernetes-id
          value: reviews
        - name: ratings.labels.backstage\.io/kubernetes-id
          value: ratings
