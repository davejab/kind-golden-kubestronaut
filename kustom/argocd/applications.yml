apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nginx
  annotations:
    "helm.sh/hook": post-install,post-upgrade
spec:
  destination:
    namespace: nginx
    server: https://kubernetes.default.svc
  source:
    path: nginx
    repoURL: https://github.com/davejab/sample-apps
    targetRevision: HEAD
    helm:
      valueFiles:
        - values.yaml
      parameters:
        - name: ingress.enabled
          value: 'true'
        - name: ingress.hosts[0].host
        - name: commonLabels.backstage\.io/kubernetes-id
          value: nginx
  project: sample-apps
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
      enabled: true
    syncOptions:
      - CreateNamespace=true
